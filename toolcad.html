<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ToolCAD Project</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- 字体 -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(to bottom, #eef2f7, #ffffff);
      text-align: center;
    }

    .hero {
      padding: 80px 20px;
    }

    .title {
      font-size: 80px;
      font-weight: 600;
      background: linear-gradient(90deg, #d4a017, #7a8bd0);
      -webkit-background-clip: text;
      color: transparent;
    }

    .subtitle {
      font-size: 20px;
      color: #444;
      margin-top: 20px;
    }

    .authors {
      margin-top: 30px;
      font-size: 16px;
      color: #2a5bd7;
    }

    .affiliation {
      margin-top: 10px;
      font-size: 14px;
      color: #666;
    }

    .badge {
      margin-top: 20px;
      font-size: 16px;
      font-weight: 600;
    }

    .spotlight {
      background: linear-gradient(45deg, #7a5cff, #d94fcf);
      color: white;
      padding: 5px 12px;
      border-radius: 12px;
      margin-left: 10px;
    }

    .buttons {
      margin-top: 40px;
    }

    .btn {
      display: inline-block;
      padding: 12px 24px;
      margin: 10px;
      border-radius: 12px;
      color: white;
      font-weight: 500;
      text-decoration: none;
      box-shadow: 0 5px 15px rgba(0,0,0,0.15);
      transition: 0.2s;
    }

    .btn:hover {
      transform: translateY(-3px);
    }

    .paper { background: #4f6fdc; }
    .arxiv { background: #e0523d; }
    .code { background: #6a5acd; }
    .data { background: #2e8b57; }
    .poster { background: #e67e22; }

  </style>
</head>

<body>

<div class="hero">

  <div class="title">ToolCAD</div>

  <div class="subtitle">
    ToolCAD: Exploring Tool-Using Large Language<br>
    Models in Text-to-CAD Generation with Reinforcement Learning 
  </div>

  <div class="authors">
    First Author¹* · Second Author¹ · Third Author²
  </div>

  <div class="affiliation">
    ¹ Your Lab · ² Another Institution
  </div>

  <!-- <div class="badge">
    NeurIPS 2024 <span class="spotlight">SPOTLIGHT</span>
  </div> -->

  <div class="buttons">
    <!-- <a class="btn paper" href="#">📄 Paper</a> -->
    <a class="btn arxiv" href="#">📕 arXiv</a>
    <a class="btn code" href="#">💻 Code</a>
    <!-- <a class="btn data" href="#">🤗 Dataset</a> -->
  <!-- <a class="btn poster" href="#">🖼 Poster</a> -->
  </div>

</div>

</body>
</html>
